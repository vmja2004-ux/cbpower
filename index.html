<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CB 專業監控中心</title>
    <!-- 使用 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 使用 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            transition: background-color 0.5s ease;
        }

        .dark {
            background-color: #0f172a;
            color: #f1f5f9;
        }

        /* 滾動條樣式 - 隱藏或極細化 */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #334155;
        }

        .glass-nav {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* Tooltip 樣式 */
        #chart-tooltip {
            pointer-events: none;
            transition: opacity 0.15s ease;
            z-index: 9999;
            font-size: 11px;
            font-weight: 900;
        }

        @keyframes pulse-fast {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.95); }
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    borderRadius: {
                        '3xl': '1rem',
                        '4xl': '1.5rem',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-6">

    <!-- 全局浮動提示框 -->
    <div id="chart-tooltip" class="fixed hidden bg-slate-900 text-white px-2 py-1 rounded shadow-2xl border border-slate-700 font-mono tracking-tighter"></div>

    <!-- Navbar - 緊湊高度 -->
    <nav id="navbar" class="bg-slate-900 border-b border-slate-800 px-6 py-2 sticky top-0 z-40 text-white shadow-md">
        <div class="max-w-[1750px] mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-1.5 rounded-lg">
                    <i data-lucide="trending-up" class="w-5 h-5"></i>
                </div>
                <div>
                    <h1 class="text-lg font-black tracking-tight leading-none">CB 專業監控中心</h1>
                    <p class="text-[8px] text-indigo-400 font-bold uppercase tracking-widest mt-1 opacity-70">Analytics Engine</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="toggleDarkMode()" class="p-1.5 rounded-lg bg-slate-800 text-slate-400 hover:text-white" id="theme-btn">
                    <i data-lucide="moon" class="w-4 h-4" id="theme-icon"></i>
                </button>
                <div class="bg-slate-800 px-3 py-1 rounded-lg border border-slate-700">
                    <span class="text-[10px] font-bold text-slate-300" id="current-date"></span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-[1750px] mx-auto px-4 py-4">
        
        <!-- Upload Zone -->
        <div id="upload-zone" class="mb-4 border-2 border-dashed rounded-3xl p-8 text-center transition-all cursor-pointer border-slate-200 bg-white hover:border-indigo-400">
            <input type="file" id="file-input" class="hidden" accept=".csv,.txt">
            <div class="bg-indigo-600 w-10 h-10 rounded-xl flex items-center justify-center mx-auto mb-3 shadow-lg">
                <i data-lucide="file-up" class="w-5 h-5 text-white"></i>
            </div>
            <h2 class="text-xl font-black text-slate-800">匯入專業報表</h2>
            <p class="text-slate-400 text-xs font-medium mt-1">分析 20日價格與 15日CBAS量能變化</p>
        </div>

        <!-- File Info Bar -->
        <div id="file-info" class="hidden mb-4 bg-white rounded-2xl p-3 shadow border border-slate-100 flex items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-600 p-2.5 rounded-xl">
                    <i data-lucide="file-spreadsheet" class="w-5 h-5 text-white"></i>
                </div>
                <div>
                    <h3 id="file-name-display" class="font-black text-sm text-slate-800 leading-none"></h3>
                    <div class="flex items-center gap-2 mt-1">
                        <span class="text-[10px] font-black text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-full">符合：<span id="match-count">0</span></span>
                        <span class="text-[10px] font-bold text-slate-400">總量：<span id="total-count">0</span></span>
                    </div>
                </div>
            </div>
            <button onclick="resetData()" class="px-4 py-1.5 bg-slate-100 text-slate-500 rounded-xl font-black text-xs hover:bg-rose-50 hover:text-rose-600 transition-colors">重選</button>
        </div>

        <!-- Stats Tabs -->
        <div id="stats-container" class="hidden grid grid-cols-3 gap-4 mb-4">
            <div onclick="setActiveTab('cbas_high')" id="tab-cbas" class="stat-tab cursor-pointer p-4 rounded-2xl border-2 border-emerald-500 bg-white transition-all relative overflow-hidden">
                <div class="flex justify-between items-center mb-1">
                    <i data-lucide="activity" class="w-4 h-4 text-emerald-500"></i>
                    <span id="stat-cbas" class="text-2xl font-black tracking-tighter text-emerald-600">0</span>
                </div>
                <h3 class="font-black text-xs text-slate-900 leading-tight">CBAS 10日新高</h3>
                <div class="absolute bottom-0 left-0 w-full h-1 bg-emerald-500"></div>
            </div>

            <div onclick="setActiveTab('vol_high')" id="tab-vol" class="stat-tab cursor-pointer p-4 rounded-2xl border-2 border-slate-100 bg-white transition-all relative overflow-hidden">
                <div class="flex justify-between items-center mb-1">
                    <i data-lucide="bar-chart-3" class="w-4 h-4 text-slate-300"></i>
                    <span id="stat-vol" class="text-2xl font-black tracking-tighter text-slate-100">0</span>
                </div>
                <h3 class="font-black text-xs text-slate-500 leading-tight text-nowrap">成交量 10日新高</h3>
            </div>

            <div onclick="setActiveTab('ref_high')" id="tab-ref" class="stat-tab cursor-pointer p-4 rounded-2xl border-2 border-slate-100 bg-white transition-all relative overflow-hidden">
                <div class="flex justify-between items-center mb-1">
                    <i data-lucide="layout-dashboard" class="w-4 h-4 text-slate-300"></i>
                    <span id="stat-ref" class="text-2xl font-black tracking-tighter text-slate-100">0</span>
                </div>
                <h3 class="font-black text-xs text-slate-500 leading-tight text-nowrap">參考價 20日新高</h3>
            </div>
        </div>

        <!-- Table Section -->
        <div id="table-container" class="hidden rounded-3xl border border-slate-200 bg-white shadow-lg overflow-hidden transition-all">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[1450px]">
                    <thead class="bg-slate-50/50">
                        <tr class="text-[10px] font-black uppercase tracking-wider text-slate-400 border-b border-slate-100">
                            <th class="px-6 py-3 cursor-pointer hover:text-indigo-600" onclick="handleSort('symbol')">
                                <div class="flex items-center gap-2">標的 <span id="sort-symbol"></span></div>
                            </th>
                            <th class="px-6 py-3 text-right cursor-pointer hover:text-indigo-600" onclick="handleSort('price')">
                                <div class="flex items-center justify-end gap-2 text-slate-900">價格 / 20日走勢 <span id="sort-price"></span></div>
                            </th>
                            <th class="px-6 py-3 text-right cursor-pointer hover:text-indigo-600" onclick="handleSort('conversionValue')">
                                <div class="flex items-center justify-end gap-2 text-indigo-600">轉換價值 <span id="sort-conversionValue"></span></div>
                            </th>
                            <th class="px-6 py-3 text-right cursor-pointer hover:text-indigo-600" onclick="handleSort('volume')">
                                <div class="flex items-center justify-end gap-2 text-slate-900">成交量 <span id="sort-volume"></span></div>
                            </th>
                            <th class="px-6 py-3 text-right cursor-pointer hover:text-indigo-600" onclick="handleSort('avgVolume5')">
                                <div class="flex items-center justify-end gap-2">5日均量 <span id="sort-avgVolume5"></span></div>
                            </th>
                            <th class="px-6 py-3 text-right cursor-pointer hover:text-indigo-600" onclick="handleSort('premium')">
                                <div class="flex items-center justify-end gap-2">折溢價 <span id="sort-premium"></span></div>
                            </th>
                            <th class="px-6 py-3 text-right font-black text-indigo-600">剩餘%</th>
                            <th class="px-6 py-3 text-center cursor-pointer hover:text-indigo-600" onclick="handleSort('trust')">
                                <div class="flex items-center justify-center gap-2">投信 <span id="sort-trust"></span></div>
                            </th>
                            <th class="px-6 py-3 text-right cursor-pointer hover:text-indigo-600 bg-indigo-50/40" onclick="handleSort('cbas')">
                                <div class="flex items-center justify-end gap-2 text-indigo-800">CBAS(T-1) / 15日量能 <span id="sort-cbas"></span></div>
                            </th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-50">
                        <!-- Rows -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden py-32 flex flex-col items-center">
            <i data-lucide="alert-circle" class="w-16 h-16 text-slate-200 mb-4"></i>
            <p class="text-xl font-black text-slate-300">目前無符合條件之標的</p>
        </div>
    </main>

    <script>
        // --- 全局 Tooltip 邏輯 ---
        window.showChartTooltip = (e, val, type, dateLabel) => {
            const tooltip = document.getElementById('chart-tooltip');
            tooltip.innerHTML = `<span class="opacity-50 mr-1">${dateLabel}</span> ${type}: <span class="text-indigo-400">${val}</span>`;
            tooltip.classList.remove('hidden');
            tooltip.style.left = (e.clientX + 10) + 'px';
            tooltip.style.top = (e.clientY - 30) + 'px';
        };
        window.hideChartTooltip = () => {
            document.getElementById('chart-tooltip').classList.add('hidden');
        };

        // --- State ---
        let rawData = [];
        let activeTab = 'cbas_high';
        let sortConfig = { key: 'cbas', direction: 'desc' };
        let searchTerm = '';
        let isDarkMode = false;

        const THRESHOLD_CONV_VALUE = 85;
        const THRESHOLD_REMAINING = 30;
        const RANGE_MIN = 90;
        const RANGE_MAX = 170;

        // --- Init ---
        window.onload = () => {
            lucide.createIcons();
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('zh-TW', { month: '2-digit', day: '2-digit', weekday: 'short' });
            
            const dropZone = document.getElementById('upload-zone');
            dropZone.onclick = () => document.getElementById('file-input').click();
            dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('border-indigo-400', 'bg-indigo-50'); };
            dropZone.ondragleave = () => { dropZone.classList.remove('border-indigo-400', 'bg-indigo-50'); };
            dropZone.ondrop = (e) => {
                e.preventDefault();
                dropZone.classList.remove('border-indigo-400', 'bg-indigo-50');
                handleFile(e.dataTransfer.files[0]);
            };
            document.getElementById('file-input').onchange = (e) => handleFile(e.target.files[0]);
        };

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => parseCSV(e.target.result, file.name);
            reader.readAsText(file);
        }

        const cleanVal = (v) => {
            if (!v) return 0;
            return parseFloat(v.toString().replace(/[%,"]/g, '').replace(/\s/g, '')) || 0;
        };

        /**
         * 繪製交互式柱狀圖 (Bar Chart)
         * @param {Array} series 數列
         * @param {Number} count 顯示天數
         * @param {String} color 顏色
         * @param {Number} skip 忽略開頭天數 (例如 CBAS 忽視 T-0)
         * @param {String} typeName 數據類型名稱 (用於 Tooltip)
         */
        function createBarChartSVG(series, count = 20, color = null, skip = 0, typeName = "") {
            if (!series || series.length < (skip + 1)) return '';
            
            const data = series.slice(skip, skip + count).reverse();
            const min = Math.min(...data);
            const max = Math.max(...data);
            const range = (max - min) || 1;
            
            const width = 110;
            const height = 24;
            const gap = 1;
            const barWidth = (width - (gap * (data.length - 1))) / data.length;
            const strokeColor = color || (isDarkMode ? '#818cf8' : '#4f46e5');

            let bars = '';
            data.forEach((val, i) => {
                const x = i * (barWidth + gap);
                const h = Math.max(((val - min) / range) * height, 1.5);
                const y = height - h;
                const isMax = (val === max && val !== min);
                
                // 決定日期標籤
                let dateLabel = "";
                if (skip === 1) {
                    // CBAS 邏輯: 這裡是反轉過的，最後一個柱子是 T-1
                    dateLabel = `T-${(count) - i}`;
                } else {
                    // 價格邏輯: 這裡是反轉過的，最後一個柱子是 今日
                    dateLabel = (i === data.length - 1) ? "今日" : `T-${(data.length - 1) - i}`;
                }

                bars += `<rect x="${x}" y="${y}" width="${barWidth}" height="${h}" rx="0.3" 
                        fill="${strokeColor}" fill-opacity="${isMax ? '1' : '0.35'}" 
                        class="cursor-crosshair transition-opacity hover:fill-opacity-100"
                        onmousemove="window.showChartTooltip(event, '${val.toLocaleString()}', '${typeName}', '${dateLabel}')" 
                        onmouseleave="window.hideChartTooltip()" />`;
            });
            
            return `<svg width="${width}" height="${height}" class="mt-1 ml-auto block overflow-visible">${bars}</svg>`;
        }

        function parseCSV(content, name) {
            const lines = content.split(/\r?\n/).filter(l => l.trim() !== '');
            if (lines.length < 3) return;

            const splitCSVLine = (line) => {
                const result = [];
                let current = '', inQuotes = false;
                for (let char of line) {
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) { result.push(current); current = ''; }
                    else current += char;
                }
                result.push(current);
                return result;
            };

            const row0 = splitCSVLine(lines[0]);
            const row1 = splitCSVLine(lines[1]);

            const findColumns = (cat) => {
                let start = row0.findIndex(h => h.includes(cat));
                if (start === -1) return [];
                const indices = [];
                for (let i = start; i < row1.length; i++) {
                    if (i > start && row0[i] && row0[i].trim() !== '') break;
                    indices.push(i);
                }
                return indices;
            };

            const idxSym = row1.indexOf('代號');
            const idxName = row1.indexOf('名稱');
            const idxPrice = row1.indexOf('轉債價格');
            const idxConv = row1.indexOf('轉換價值');
            const idxPrem = row1.indexOf('折溢價');
            const idxRem = row1.indexOf('剩餘%');

            const cbasIdx = findColumns('CBAS拆解');
            const volIdx = findColumns('CB成交量');
            const refIdx = findColumns('轉債參考價');
            const trustIdx = findColumns('投信買賣超');

            rawData = lines.slice(2).map((line, index) => {
                const cols = splitCSVLine(line);
                const getS = (idx) => idx.map(i => cleanVal(cols[i]));
                const cbasS = getS(cbasIdx);
                const volS = getS(volIdx);
                const refS = getS(refIdx);

                const avgVol5 = volS.slice(0, 5).reduce((a, b) => a + b, 0) / 5;

                const isHigh = (s, d) => {
                    if (s.length <= d) return false;
                    const cur = s[0];
                    const hist = s.slice(1, d + 1);
                    return cur > 0 && cur >= Math.max(...hist);
                };

                const isCbasHigh = (s) => {
                    if (s.length < 12) return false;
                    const target = s[1];
                    const range = s.slice(1, 12);
                    return target > 0 && target >= Math.max(...range);
                };

                return {
                    id: index,
                    symbol: cols[idxSym] || '',
                    name: cols[idxName] || '',
                    price: cleanVal(cols[idxPrice]),
                    priceSeries: refS,
                    conversionValue: cleanVal(cols[idxConv]),
                    volume: volS[0] || 0,
                    avgVolume5: avgVol5,
                    premium: cols[idxPrem] || '0%',
                    remaining: cols[idxRem] || '0%',
                    trust: cleanVal(cols[trustIdx[0]]),
                    cbas: cbasS[1] || 0,
                    cbasSeries: cbasS,
                    isCbas10High: isCbasHigh(cbasS),
                    isVol10High: isHigh(volS, 9),
                    isRef20High: isHigh(refS, 19),
                    premiumVal: cleanVal(cols[idxPrem])
                };
            });

            document.getElementById('upload-zone').classList.add('hidden');
            document.getElementById('file-info').classList.remove('hidden');
            document.getElementById('stats-container').classList.remove('hidden');
            document.getElementById('table-container').classList.remove('hidden');
            document.getElementById('file-name-display').innerText = name;

            updateStats();
            render();
        }

        function updateStats() {
            const base = rawData.filter(d => d.conversionValue > THRESHOLD_CONV_VALUE && cleanVal(d.remaining) > THRESHOLD_REMAINING);
            document.getElementById('stat-cbas').innerText = base.filter(d => d.isCbas10High).length;
            document.getElementById('stat-vol').innerText = base.filter(d => d.isVol10High && d.conversionValue >= RANGE_MIN && d.conversionValue <= RANGE_MAX).length;
            document.getElementById('stat-ref').innerText = base.filter(d => d.isRef20High && d.volume > 10 && d.conversionValue >= RANGE_MIN && d.conversionValue <= RANGE_MAX).length;
            document.getElementById('match-count').innerText = base.length;
            document.getElementById('total-count').innerText = rawData.length;
        }

        function handleSearch() {
            searchTerm = document.getElementById('search-input').value.toLowerCase();
            render();
        }

        function handleSort(key) {
            if (sortConfig.key === key) sortConfig.direction = sortConfig.direction === 'desc' ? 'asc' : 'desc';
            else { sortConfig.key = key; sortConfig.direction = 'desc'; }
            render();
        }

        function setActiveTab(tab) {
            activeTab = tab;
            const tabs = document.querySelectorAll('.stat-tab');
            tabs.forEach(t => {
                t.classList.remove('border-emerald-500', 'border-blue-500', 'border-amber-500', 'shadow-md');
                t.classList.add('border-slate-100');
            });
            const activeT = document.getElementById('tab-' + tab.split('_')[0]);
            const color = tab === 'cbas_high' ? 'emerald' : tab === 'vol_high' ? 'blue' : 'amber';
            activeT.classList.remove('border-slate-100');
            activeT.classList.add('border-' + color + '-500', 'shadow-sm');
            render();
        }

        function render() {
            let filtered = rawData.filter(d => d.conversionValue > THRESHOLD_CONV_VALUE && cleanVal(d.remaining) > THRESHOLD_REMAINING);
            if (searchTerm) filtered = filtered.filter(d => d.name.toLowerCase().includes(searchTerm) || d.symbol.toLowerCase().includes(searchTerm));

            switch(activeTab) {
                case 'cbas_high': filtered = filtered.filter(d => d.isCbas10High); break;
                case 'vol_high': filtered = filtered.filter(d => d.isVol10High && d.conversionValue >= RANGE_MIN && d.conversionValue <= RANGE_MAX); break;
                case 'ref_high': filtered = filtered.filter(d => d.isRef20High && d.volume > 10 && d.conversionValue >= RANGE_MIN && d.conversionValue <= RANGE_MAX); break;
            }

            if (sortConfig.key) {
                filtered.sort((a, b) => {
                    let aV = a[sortConfig.key], bV = b[sortConfig.key];
                    if (sortConfig.key === 'premium') { aV = a.premiumVal; bV = b.premiumVal; }
                    return sortConfig.direction === 'desc' ? bV - aV : aV - bV;
                });
            }

            document.querySelectorAll('[id^="sort-"]').forEach(el => el.innerHTML = '<i data-lucide="chevron-up" class="w-3 h-3 opacity-10"></i>');
            const activeIcon = document.getElementById('sort-' + sortConfig.key);
            if (activeIcon) activeIcon.innerHTML = `<i data-lucide="chevron-${sortConfig.direction === 'desc' ? 'down' : 'up'}" class="w-3 h-3 text-indigo-500"></i>`;

            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            if (filtered.length === 0) {
                document.getElementById('table-container').classList.add('hidden');
                document.getElementById('empty-state').classList.remove('hidden');
            } else {
                document.getElementById('table-container').classList.remove('hidden');
                document.getElementById('empty-state').classList.add('hidden');
                filtered.forEach(item => {
                    const row = document.createElement('tr');
                    row.className = `transition-all group ${isDarkMode ? 'hover:bg-indigo-500/10' : 'hover:bg-indigo-50/20'}`;
                    row.innerHTML = `
                        <td class="px-6 py-3">
                            <div class="flex flex-col">
                                <span class="text-[10px] font-black font-mono text-slate-400">${item.symbol}</span>
                                <span class="font-black text-sm group-hover:text-indigo-600 ${isDarkMode ? 'text-slate-200' : 'text-slate-900'}">${item.name}</span>
                            </div>
                        </td>
                        <td class="px-6 py-3 text-right">
                            <div class="flex flex-col items-end justify-center">
                                <span class="font-mono font-black text-lg ${isDarkMode ? 'text-slate-300' : 'text-slate-800'}">${item.price.toFixed(2)}</span>
                                ${createBarChartSVG(item.priceSeries, 20, null, 0, "價格")}
                                ${item.isRef20High ? `<span class="text-[8px] font-black text-amber-500 uppercase mt-0.5 animate-pulse">20D Breakout</span>` : ''}
                            </div>
                        </td>
                        <td class="px-6 py-3 text-right">
                            <span class="font-mono font-black text-2xl ${isDarkMode ? 'text-indigo-400' : 'text-indigo-600'}">${item.conversionValue.toFixed(1)}</span>
                        </td>
                        <td class="px-6 py-3 text-right">
                            <div class="flex flex-col items-end justify-center">
                                <span class="font-mono font-black text-lg ${isDarkMode ? 'text-slate-100' : 'text-slate-900'}">${item.volume.toLocaleString()}</span>
                                ${item.isVol10High ? `<span class="text-[8px] font-black text-blue-500 uppercase">Vol High</span>` : ''}
                            </div>
                        </td>
                        <td class="px-6 py-3 text-right">
                            <span class="font-mono text-base font-bold text-slate-400">${item.avgVolume5.toFixed(1)}</span>
                        </td>
                        <td class="px-6 py-3 text-right">
                            <span class="px-2 py-0.5 rounded-lg text-[10px] font-black border ${item.premiumVal > 15 ? 'bg-rose-50 text-rose-600 border-rose-100' : 'bg-emerald-50 text-emerald-600 border-emerald-100'}">${item.premium}</span>
                        </td>
                        <td class="px-6 py-3 text-right font-black text-xl italic ${isDarkMode ? 'text-slate-300' : 'text-slate-800'}">${item.remaining}</td>
                        <td class="px-6 py-3 text-center">
                            <span class="inline-flex items-center justify-center min-w-[45px] px-2 py-0.5 rounded-lg font-black text-[10px] border ${item.trust > 0 ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-500'}">${item.trust > 0 ? '+'+item.trust : item.trust}</span>
                        </td>
                        <td class="px-6 py-3 text-right bg-indigo-50/20">
                            <div class="flex flex-col items-end">
                                <span class="font-mono font-black text-2xl text-indigo-700">${item.cbas.toLocaleString()}</span>
                                ${createBarChartSVG(item.cbasSeries, 15, '#10b981', 1, "CBAS")}
                                ${item.isCbas10High ? `<span class="text-[8px] font-black text-emerald-500 uppercase animate-pulse">10D High</span>` : ''}
                            </div>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            }
            lucide.createIcons();
        }

        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            document.documentElement.classList.toggle('dark', isDarkMode);
            document.getElementById('theme-icon').setAttribute('data-lucide', isDarkMode ? 'sun' : 'moon');
            lucide.createIcons();
            render();
        }

        function resetData() {
            rawData = [];
            document.getElementById('upload-zone').classList.remove('hidden');
            document.getElementById('file-info').classList.add('hidden');
            document.getElementById('stats-container').classList.add('hidden');
            document.getElementById('table-container').classList.add('hidden');
            document.getElementById('empty-state').classList.add('hidden');
        }
    </script>
</body>
</html>
